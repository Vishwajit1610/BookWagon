<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookWagon — Home</title>

    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">📚 BookWagon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                </ul>

                <form class="d-flex me-3" role="search" onsubmit="return false;">
                    <input id="top-search" class="form-control me-2" type="search" placeholder="Search books or author"
                        aria-label="Search">
                </form>

                <button id="btn-view-cart" class="btn btn-outline-primary position-relative">
                    <i class="bi bi-cart3"></i> Cart
                    <span id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="bg-light py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-7">
                    <h1 class="display-5">Find your next favorite book</h1>
                    <p class="lead text-muted">Browse categories, search by title or author, and add to cart — instant
                        preview, no backend required.</p>

                    <div class="input-group my-3">
                        <input id="hero-search" type="text" class="form-control"
                            placeholder="Search by title, author, or ISBN">
                        <button id="hero-search-btn" class="btn btn-primary">Search</button>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Categories</h5>
                            <div id="categories" class="d-flex flex-wrap gap-2">
                                <!-- categories added by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- FEATURED BOOKS -->
    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="h4 m-0">Featured Books</h2>
                <div>
                    <select id="sort-select" class="form-select form-select-sm">
                        <option value="default">Sort: Default</option>
                        <option value="price-asc">Price: Low → High</option>
                        <option value="price-desc">Price: High → Low</option>
                    </select>
                </div>
            </div>

            <div id="books-container" class="row g-4">
                <!-- JS will render book cards here -->

            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-4">
        <div class="container text-center">
            <p class="mb-0 small text-muted">© BookWagon 2025 | All Rights Reserved</p>
        </div>
    </footer>

    <!-- CART MODAL -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Your Cart</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="cart-items-container">
                        <!-- cart items table rendered by JS -->
                    </div>

                    <div class="mt-3 d-flex justify-content-end">
                        <div class="me-3">
                            <strong>Total: </strong> <span id="cart-total">₹0.00</span>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button id="btn-clear-cart" type="button" class="btn btn-outline-danger">Clear Cart</button>
                    <button id="btn-checkout" type="button" class="btn btn-primary">Checkout (demo)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS + Popper (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>
</body>

</html>
